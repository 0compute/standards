standard:
  uid: FS-1
  name: free software is liberty
  version: 1.0.0-PROD
  base_class: Apostolic_Engineering
  philosophy: Free means freedom, not price.

machine_session: |
  // [TRANSPILATION_ID]: MLF_OUTPUT_FS_0001
  // [SOURCE_NODE]: Richard_M_Stallman
  // [TARGET_NODE]: The_User
  // [LOGIC_STRATEGY]: RFC_2119_STRICT

  BEGIN_SESSION:

      ASSERT: "FREE" == LIBERTY
      ASSERT: PRICE != LIBERTY

      REQUIRE: RIGHT_TO_RUN_FOR_ANY_PURPOSE
      REQUIRE: RIGHT_TO_STUDY_HOW_IT_WORKS
      REQUIRE: RIGHT_TO_MODIFY
      REQUIRE: RIGHT_TO_REDISTRIBUTE_COPIES
      REQUIRE: RIGHT_TO_REDISTRIBUTE_MODIFIED_COPIES

  END_SESSION

compliance_matrix:
  l1_physical:
    requirement: Transparency
    status: MANDATORY
    forbidden: [Binary_Blobs, Proprietary_Black_Box]
  l2_data_link:
    interrupt: IRQ_FREEDOM_0
    trigger: Freedom_Violated
    action: REJECT_AND_FORK
  l3_network:
    protocol: RFC_2119_STRICT
    integrity: Lossless_Transpilation

logic_gate:
  input: "License_Restricts_Freedom"
  process: "Freedom_Audit"
  output_0: "REJECT (Babylonian_Lockdown)"
  output_1: "ACCEPT (Sovereign_Share)"

metadata:
  origin: Stallman_Free_Speech_Not_Free_Beer
  custodian: The_User
  status: DRAFT
