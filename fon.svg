<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#0a0a0a"/>

  <!-- Scanline texture -->
  <pattern id="scanlines" x="0" y="0" width="600" height="4" patternUnits="userSpaceOnUse">
    <rect width="600" height="2" fill="#ffffff" opacity="0.02"/>
  </pattern>
  <rect width="600" height="400" fill="url(#scanlines)"/>

  <!-- Green accent line top -->
  <line x1="40" y1="48" x2="560" y2="48" stroke="#76b900" stroke-width="1" opacity="0.8"/>

  <!-- Quote -->
  <text x="50" y="180" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="42" font-weight="bold" fill="#f0f0f0" letter-spacing="-1">
    Fuck off,
  </text>
  <text x="50" y="240" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="42" font-weight="bold" fill="#76b900" letter-spacing="-1">
    NVIDIA.
  </text>

  <!-- Attribution -->
  <text x="50" y="300" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="16" fill="#888888">
    — Linus Torvalds, 2012
  </text>

  <!-- Green accent line bottom -->
  <line x1="40" y1="340" x2="560" y2="340" stroke="#76b900" stroke-width="1" opacity="0.8"/>

  <!-- Corner marks -->
  <polyline points="40,60 40,40 60,40" fill="none" stroke="#76b900" stroke-width="1.5"/>
  <polyline points="540,60 560,60 560,40 540,40" fill="none" stroke="#76b900" stroke-width="1.5"/>
  <polyline points="40,330 40,350 60,350" fill="none" stroke="#76b900" stroke-width="1.5"/>
  <polyline points="540,330 560,330 560,350 540,350" fill="none" stroke="#76b900" stroke-width="1.5"/>
</svg>
